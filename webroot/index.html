<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForceDNS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --red: #f85149; --orange: #d29922;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }

        .header { text-align: center; padding: 24px 0 16px; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--text2); font-size: 14px; margin-top: 4px; }

        .env-banner { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; text-align: center; }
        .env-banner.ok { background: rgba(63,185,80,.15); border: 1px solid var(--green); color: var(--green); }
        .env-banner.err { background: rgba(248,81,73,.15); border: 1px solid var(--red); color: var(--red); }
        .env-banner.warn { background: rgba(210,153,34,.15); border: 1px solid var(--orange); color: var(--orange); }

        .status-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
        .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-actions { display: flex; gap: 8px; }

        .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; transition: all .2s; }
        .btn:hover { border-color: var(--accent); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: #79c0ff; }
        .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
        .btn-danger:hover { opacity: .85; }
        .btn-success { background: var(--green); color: #fff; border-color: var(--green); }
        .btn-success:hover { opacity: .85; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .preset-item { padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .2s; text-align: center; }
        .preset-item:hover { border-color: var(--accent); background: rgba(88,166,255,.08); }
        .preset-item.active { border-color: var(--accent); background: rgba(88,166,255,.15); }
        .preset-item .name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .preset-item .addr { color: var(--text2); font-size: 11px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; outline: none; }
        .form-group input:focus { border-color: var(--accent); }

        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
        .toggle-row .label { font-size: 14px; }
        .toggle-row .desc { font-size: 12px; color: var(--text2); }
        .toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
        .toggle.active { background: var(--accent); }
        .toggle::after { content: ''; width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: transform .2s; }
        .toggle.active::after { transform: translateX(20px); }

        .dns-info { display: flex; gap: 12px; margin-top: 12px; }
        .dns-box { flex: 1; padding: 12px; background: var(--bg); border-radius: 8px; text-align: center; }
        .dns-box .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
        .dns-box .value { font-size: 16px; font-weight: 600; font-family: monospace; color: var(--accent); }

        .log-box { background: var(--bg); border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; color: var(--text2); white-space: pre-wrap; word-break: break-all; }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-size: 14px; transition: transform .3s; z-index: 999; max-width: 90vw; text-align: center; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }

        .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border-radius: 8px; padding: 4px; border: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all .2s; }
        .tab.active { background: var(--accent); color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .whitelist-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .whitelist-item:last-child { border-bottom: none; }
        .whitelist-item .uid { font-family: monospace; font-size: 13px; }
        .whitelist-item .remove { color: var(--red); cursor: pointer; font-size: 13px; }

        .debug-box { background: #0a0e14; border-radius: 8px; padding: 12px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 11px; line-height: 1.5; color: #8b949e; white-space: pre-wrap; word-break: break-all; border: 1px solid var(--orange); }

        @media (max-width: 480px) {
            .preset-grid { grid-template-columns: repeat(2, 1fr); }
            .dns-info { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Force<span>DNS</span></h1>
        <p>DNS强制劫持管理面板</p>
    </div>

    <div id="envBanner" class="env-banner err">检测运行环境...</div>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">检测中...</span>
        </div>
        <div class="status-actions">
            <button class="btn btn-success" id="btnStart" onclick="startService()">启动</button>
            <button class="btn btn-danger" id="btnStop" onclick="stopService()">停止</button>
            <button class="btn" onclick="restartService()">重启</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">当前DNS配置</div>
        <div class="dns-info">
            <div class="dns-box">
                <div class="label">主 DNS</div>
                <div class="value" id="dnsPrimary">-</div>
            </div>
            <div class="dns-box">
                <div class="label">备 DNS</div>
                <div class="value" id="dnsSecondary">-</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('presets')">预设DNS</div>
        <div class="tab" onclick="switchTab('custom')">自定义DNS</div>
        <div class="tab" onclick="switchTab('settings')">设置</div>
        <div class="tab" onclick="switchTab('logs')">日志</div>
        <div class="tab" onclick="switchTab('debug')">调试</div>
    </div>

    <div class="tab-content active" id="tab-presets">
        <div class="card">
            <div class="card-title">预设DNS服务器</div>
            <div class="preset-grid" id="presetGrid"><p style="color:var(--text2);text-align:center;padding:20px">加载中...</p></div>
        </div>
    </div>

    <div class="tab-content" id="tab-custom">
        <div class="card">
            <div class="card-title">自定义DNS</div>
            <div class="form-group">
                <label>主 DNS 服务器</label>
                <input type="text" id="customPrimary" placeholder="例如: 8.8.8.8">
            </div>
            <div class="form-group">
                <label>备 DNS 服务器</label>
                <input type="text" id="customSecondary" placeholder="例如: 8.8.4.4">
            </div>
            <button class="btn btn-primary" onclick="applyCustomDNS()" style="width:100%">应用自定义DNS</button>
        </div>
    </div>

    <div class="tab-content" id="tab-settings">
        <div class="card">
            <div class="card-title">劫持设置</div>
            <div class="toggle-row">
                <div><div class="label">启用ForceDNS</div><div class="desc">开启后自动劫持所有DNS请求</div></div>
                <div class="toggle" id="toggleEnabled" onclick="toggleSetting('enabled')"></div>
            </div>
            <div class="toggle-row">
                <div><div class="label">IPv6 DNS劫持</div><div class="desc">同时劫持IPv6的DNS请求</div></div>
                <div class="toggle" id="toggleIpv6" onclick="toggleSetting('ipv6')"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">白名单UID</div>
            <div class="form-group" style="display:flex;gap:8px;">
                <input type="text" id="whitelistUid" placeholder="输入应用UID" style="flex:1">
                <button class="btn" onclick="addWhitelist()">添加</button>
            </div>
            <div id="whitelistContainer"><p style="color:var(--text2);font-size:13px;">白名单中的应用将跳过DNS劫持</p></div>
        </div>
    </div>

    <div class="tab-content" id="tab-logs">
        <div class="card">
            <div class="card-title" style="justify-content:space-between;">
                <span>运行日志</span>
                <button class="btn" onclick="refreshLogs()" style="padding:4px 10px;font-size:12px;">刷新</button>
            </div>
            <div class="log-box" id="logBox">点击刷新加载日志</div>
        </div>
    </div>

    <div class="tab-content" id="tab-debug">
        <div class="card">
            <div class="card-title" style="justify-content:space-between;">
                <span>调试信息</span>
                <button class="btn" onclick="runDiag()" style="padding:4px 10px;font-size:12px;">运行诊断</button>
            </div>
            <div class="debug-box" id="debugBox">点击"运行诊断"检查环境...</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
var MOD_PATH = "/data/adb/modules/forcedns";
var CORE_CMD = "sh " + MOD_PATH + "/forcedns-core.sh";
var _runtime = null;
var _debugLog = [];

function dlog(msg) {
    _debugLog.push("[" + new Date().toLocaleTimeString() + "] " + msg);
    var box = document.getElementById('debugBox');
    if (box) box.textContent = _debugLog.join("\n");
    console.log("[ForceDNS]", msg);
}

// 检测运行环境
function detectRuntime() {
    if (_runtime) return _runtime;

    dlog("开始检测运行环境...");
    dlog("window.ksu = " + typeof window.ksu);
    dlog("window.apatch = " + typeof window.apatch);
    dlog("window.ksux = " + typeof window.ksux);

    // 尝试检测所有可能的对象
    if (typeof window.ksu !== 'undefined') {
        dlog("ksu对象存在, keys: " + Object.keys(window.ksu).join(","));
        if (typeof window.ksu.exec === 'function') {
            dlog("ksu.exec 是函数");
            _runtime = "ksu";
            return "ksu";
        } else {
            dlog("ksu.exec 不是函数, type: " + typeof window.ksu.exec);
        }
    }

    if (typeof window.apatch !== 'undefined') {
        dlog("apatch对象存在, keys: " + Object.keys(window.apatch).join(","));
        if (typeof window.apatch.exec === 'function') {
            dlog("apatch.exec 是函数");
            _runtime = "apatch";
            return "apatch";
        }
    }

    if (typeof window.ksux !== 'undefined') {
        dlog("ksux对象存在, keys: " + Object.keys(window.ksux).join(","));
        if (typeof window.ksux.exec === 'function') {
            _runtime = "ksux";
            return "ksux";
        }
    }

    dlog("未检测到任何已知的root管理器桥接");
    _runtime = "none";
    return "none";
}

// 执行shell命令 - 带超时和详细日志
function execCmd(cmd, timeout) {
    timeout = timeout || 10000;
    dlog("execCmd: " + cmd);

    return new Promise(function(resolve) {
        var rt = detectRuntime();
        var resolved = false;

        // 超时保护
        var timer = setTimeout(function() {
            if (!resolved) {
                resolved = true;
                dlog("execCmd 超时 (" + timeout + "ms): " + cmd);
                resolve({ code: -2, stdout: "", stderr: "命令执行超时" });
            }
        }, timeout);

        function onDone(code, out, err) {
            if (resolved) return;
            resolved = true;
            clearTimeout(timer);
            dlog("execCmd 结果: code=" + code + " stdout=" + (out || "").substring(0, 200) + " stderr=" + (err || "").substring(0, 200));
            resolve({ code: code, stdout: out || "", stderr: err || "" });
        }

        try {
            if (rt === "ksu") {
                // KernelSU: ksu.exec(cmd, envJson, callback)
                window.ksu.exec(cmd, "{}", onDone);
            } else if (rt === "apatch") {
                window.apatch.exec(cmd, "{}", onDone);
            } else if (rt === "ksux") {
                window.ksux.exec(cmd, "{}", onDone);
            } else {
                clearTimeout(timer);
                dlog("无可用运行环境");
                resolve({ code: -1, stdout: "", stderr: "未检测到KernelSU/APatch环境" });
            }
        } catch (e) {
            clearTimeout(timer);
            dlog("execCmd 异常: " + e.message);
            resolve({ code: -1, stdout: "", stderr: "执行异常: " + e.message });
        }
    });
}

// 初始化环境检测
function initEnv() {
    var banner = document.getElementById('envBanner');
    var rt = detectRuntime();
    if (rt === "none") {
        banner.className = "env-banner err";
        banner.textContent = "未检测到KernelSU/APatch环境，请在模块管理器中打开此页面";
    } else {
        banner.className = "env-banner ok";
        var name = rt === "ksu" ? "KernelSU" : rt === "apatch" ? "APatch" : "KernelSU(兼容)";
        banner.textContent = "运行环境: " + name + " - 已连接";
    }
}

// Tab切换
function switchTab(name) {
    var tabMap = {presets:'预设',custom:'自定义',settings:'设置',logs:'日志',debug:'调试'};
    document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.toggle('active', t.textContent.indexOf(tabMap[name]) >= 0);
    });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    var el = document.getElementById('tab-' + name);
    if (el) el.classList.add('active');
}

function showToast(msg, type) {
    type = type || 'success';
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(function() { t.className = 'toast'; }, 3000);
}

// 获取状态
async function getStatus() {
    var res = await execCmd(CORE_CMD + " status");
    if (!res.stdout && res.code !== 0) {
        return null;
    }
    try {
        return JSON.parse(res.stdout);
    } catch(e) {
        dlog("JSON解析失败: " + res.stdout.substring(0, 200));
        return null;
    }
}

// 更新UI状态
async function updateStatus() {
    var s = await getStatus();
    if (!s) {
        document.getElementById('statusText').textContent = '获取失败';
        return;
    }
    var running = s.running === 1 || s.running === true;
    document.getElementById('statusDot').classList.toggle('active', running);
    document.getElementById('statusText').textContent = running ? '运行中' : '已停止';
    document.getElementById('dnsPrimary').textContent = s.dns_primary || '-';
    document.getElementById('dnsSecondary').textContent = s.dns_secondary || '-';
    document.getElementById('toggleEnabled').classList.toggle('active', s.enabled === 1 || s.enabled === true);
    document.getElementById('toggleIpv6').classList.toggle('active', s.hijack_ipv6 === 1 || s.hijack_ipv6 === true);
    document.getElementById('btnStart').disabled = running;
    document.getElementById('btnStop').disabled = !running;
}

// 加载预设
async function loadPresets() {
    var res = await execCmd(CORE_CMD + " presets");
    var presets = [];
    if (res.stdout) {
        try { presets = JSON.parse(res.stdout); } catch(e) { dlog("预设解析失败"); }
    }
    var s = await getStatus();
    var currentPreset = s ? s.preset_name : '';
    var grid = document.getElementById('presetGrid');
    grid.innerHTML = '';
    if (!presets || presets.length === 0) {
        grid.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px">无预设</p>';
        return;
    }
    presets.forEach(function(p) {
        var div = document.createElement('div');
        div.className = 'preset-item' + (p.name === currentPreset ? ' active' : '');
        div.innerHTML = '<div class="name">' + p.name + '</div><div class="addr">' + p.primary + '</div>';
        div.onclick = function() { applyPreset(p.name); };
        grid.appendChild(div);
    });
}

// 应用预设
async function applyPreset(name) {
    showToast('正在应用: ' + name);
    var res = await execCmd(CORE_CMD + " apply_preset " + name);
    showToast(res.code === 0 ? '已应用预设: ' + name : '应用失败', res.code === 0 ? 'success' : 'error');
    updateStatus();
    loadPresets();
}

// 应用自定义DNS
async function applyCustomDNS() {
    var primary = document.getElementById('customPrimary').value.trim();
    var secondary = document.getElementById('customSecondary').value.trim();
    if (!primary) { showToast('请输入主DNS', 'error'); return; }
    var res = await execCmd(CORE_CMD + " apply_custom " + primary + " " + (secondary || primary));
    showToast(res.code === 0 ? '已应用自定义DNS' : '应用失败', res.code === 0 ? 'success' : 'error');
    updateStatus();
    loadPresets();
}

// 服务控制
async function startService() {
    showToast('正在启动...');
    var res = await execCmd(CORE_CMD + " start", 15000);
    showToast(res.code === 0 ? '服务已启动' : '启动失败: ' + (res.stderr || ''), res.code === 0 ? 'success' : 'error');
    updateStatus();
}
async function stopService() {
    showToast('正在停止...');
    var res = await execCmd(CORE_CMD + " stop", 15000);
    showToast(res.code === 0 ? '服务已停止' : '停止失败: ' + (res.stderr || ''), res.code === 0 ? 'success' : 'error');
    updateStatus();
}
async function restartService() {
    showToast('正在重启...');
    var res = await execCmd(CORE_CMD + " restart", 15000);
    showToast(res.code === 0 ? '服务已重启' : '重启失败: ' + (res.stderr || ''), res.code === 0 ? 'success' : 'error');
    updateStatus();
}

// 设置切换
async function toggleSetting(key) {
    var s = await getStatus();
    if (!s) return;
    var val;
    if (key === 'enabled') val = (s.enabled === 1 || s.enabled === true) ? 0 : 1;
    else if (key === 'ipv6') val = (s.hijack_ipv6 === 1 || s.hijack_ipv6 === true) ? 0 : 1;
    else return;
    await execCmd(CORE_CMD + " set_config " + key + "=" + val);
    updateStatus();
}

// 白名单
async function addWhitelist() {
    var uid = document.getElementById('whitelistUid').value.trim();
    if (!uid) return;
    var s = await getStatus();
    if (!s) return;
    var wl = s.whitelist_uid ? s.whitelist_uid : '';
    wl = (wl + ' ' + uid).trim().replace(/\s+/g, ' ');
    await execCmd(CORE_CMD + " set_config whitelist_uid=" + wl);
    document.getElementById('whitelistUid').value = '';
    loadWhitelist();
}
async function removeWhitelist(uid) {
    var s = await getStatus();
    if (!s) return;
    var wl = s.whitelist_uid ? s.whitelist_uid : '';
    wl = wl.replace(new RegExp(uid, 'g'), '').replace(/\s+/g, ' ').trim();
    await execCmd(CORE_CMD + " set_config whitelist_uid=" + wl);
    loadWhitelist();
}
async function loadWhitelist() {
    var s = await getStatus();
    if (!s) return;
    var uids = s.whitelist_uid ? s.whitelist_uid.split(' ').filter(Boolean) : [];
    var container = document.getElementById('whitelistContainer');
    if (uids.length === 0) {
        container.innerHTML = '<p style="color:var(--text2);font-size:13px;">白名单中的应用将跳过DNS劫持</p>';
        return;
    }
    container.innerHTML = uids.map(function(uid) {
        return '<div class="whitelist-item"><span class="uid">UID: ' + uid + '</span><span class="remove" onclick="removeWhitelist(\'' + uid + '\')">移除</span></div>';
    }).join('');
}

// 日志
async function refreshLogs() {
    var res = await execCmd("cat " + MOD_PATH + "/data/forcedns.log 2>/dev/null | tail -50");
    document.getElementById('logBox').textContent = res.stdout || '暂无日志';
    document.getElementById('logBox').scrollTop = document.getElementById('logBox').scrollHeight;
}

// 诊断
async function runDiag() {
    _debugLog = [];
    var box = document.getElementById('debugBox');
    box.textContent = "运行诊断中...";

    dlog("=== ForceDNS 诊断 ===");
    dlog("UserAgent: " + navigator.userAgent);
    dlog("URL: " + window.location.href);

    // 1. 检测桥接对象
    dlog("\n--- 桥接对象检测 ---");
    dlog("typeof window.ksu = " + typeof window.ksu);
    dlog("typeof window.apatch = " + typeof window.apatch);
    dlog("typeof window.ksux = " + typeof window.ksux);

    if (typeof window.ksu === 'object') {
        dlog("ksu keys: " + Object.getOwnPropertyNames(window.ksu).join(", "));
        dlog("ksu.exec type: " + typeof window.ksu.exec);
        if (window.ksu.exec) {
            dlog("ksu.exec.toString(): " + window.ksu.exec.toString().substring(0, 200));
        }
    }

    // 2. 测试基本命令
    dlog("\n--- 测试 echo ---");
    var echoRes = await execCmd("echo HELLO_FORCEDNS", 5000);
    dlog("echo结果: code=" + echoRes.code + " stdout='" + echoRes.stdout + "' stderr='" + echoRes.stderr + "'");

    // 3. 检查模块文件
    dlog("\n--- 检查模块文件 ---");
    var lsRes = await execCmd("ls -la " + MOD_PATH + "/", 5000);
    dlog("模块目录:\n" + lsRes.stdout);

    var coreRes = await execCmd("ls -la " + MOD_PATH + "/forcedns-core.sh", 5000);
    dlog("核心脚本:\n" + coreRes.stdout);

    var confRes = await execCmd("cat " + MOD_PATH + "/data/forcedns.conf 2>/dev/null", 5000);
    dlog("配置文件:\n" + confRes.stdout);

    // 4. 测试核心脚本
    dlog("\n--- 测试核心脚本 ---");
    var statusRes = await execCmd(CORE_CMD + " status", 5000);
    dlog("status结果: code=" + statusRes.code + "\nstdout='" + statusRes.stdout + "'\nstderr='" + statusRes.stderr + "'");

    // 5. 检查iptables
    dlog("\n--- 检查iptables ---");
    var iptRes = await execCmd("which iptables; iptables -t nat -L FORCEDNS 2>&1 | head -5", 5000);
    dlog("iptables:\n" + iptRes.stdout);

    // 6. 检查dnsmasq
    dlog("\n--- 检查dnsmasq ---");
    var dnsRes = await execCmd("which dnsmasq; dnsmasq --version 2>&1 | head -1", 5000);
    dlog("dnsmasq:\n" + dnsRes.stdout);

    dlog("\n=== 诊断完成 ===");
    box.textContent = _debugLog.join("\n");
}

// 初始化
dlog("ForceDNS WebUI 加载");
initEnv();
updateStatus();
loadPresets();
loadWhitelist();
</script>
